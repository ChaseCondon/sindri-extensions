name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest

    env:
      SINDRI_IDE_ROOT: ${{ github.workspace }}/sindri-ide

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Checkout sindri-ide (bun deps + Rust CLI source) ───────────────────
      - name: Checkout sindri-ide
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sindri
          path: sindri-ide
          sparse-checkout: |
            /package.json
            /bun.lockb
            scripts/
            packages/
            src-tauri/Cargo.toml
            src-tauri/Cargo.lock
            src-tauri/crates/sindri-cli/
            src-tauri/crates/sindri-core/
          sparse-checkout-cone-mode: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Bun (needed by ext build's JS bundle step) ─────────────────────────
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install sindri-ide dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ github.workspace }}/sindri-ide

      # ── Rust + sindri CLI ──────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sindri-ide/src-tauri -> target

      - name: Build sindri CLI
        run: cargo build --release -p sindri-cli
        working-directory: ${{ github.workspace }}/sindri-ide/src-tauri

      - name: Add sindri to PATH
        run: echo "${{ github.workspace }}/sindri-ide/src-tauri/target/release" >> $GITHUB_PATH

      # ── Detect changed extensions ──────────────────────────────────────────
      - name: Detect changed extensions
        id: changes
        run: |
          # Exit code 1 = no changes; swallow it so the step succeeds.
          CHANGED_JSON=$(sindri ext changed --repo . --since "origin/${{ github.base_ref }}" --json 2>&1) || true
          echo "changed_json=$CHANGED_JSON" >> $GITHUB_OUTPUT
          echo "Changed extensions: $CHANGED_JSON"
          # Count how many entries (non-empty array means changes exist).
          COUNT=$(echo "$CHANGED_JSON" | jq 'length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # ── Version bump check ─────────────────────────────────────────────────
      # Fail if a changed extension's manifest version is already released.
      - name: Check version bumps
        if: steps.changes.outputs.count != '0'
        run: |
          git fetch --tags origin
          FAILED=0
          for ROW in $(echo '${{ steps.changes.outputs.changed_json }}' | jq -r '.[] | @base64'); do
            _jq() { echo "${ROW}" | base64 --decode | jq -r "${1}"; }
            ID=$(_jq '.id')
            DIR=$(_jq '.dir')
            VERSION=$(jq -r .version "$DIR/manifest.json")
            TAG="${ID}-v${VERSION}"
            if git tag -l "$TAG" | grep -q "$TAG"; then
              echo "ERROR: $ID@$VERSION is already released (tag $TAG exists)."
              echo "  Bump the version in $DIR/manifest.json before merging."
              FAILED=$((FAILED + 1))
            else
              echo "✓ $ID@$VERSION is a new version — will release on merge."
            fi
          done
          if [ $FAILED -gt 0 ]; then exit 1; fi

      # ── Validate manifests of changed extensions ───────────────────────────
      - name: Validate manifests
        if: steps.changes.outputs.count != '0'
        run: |
          FAILED=0
          for DIR in $(echo '${{ steps.changes.outputs.changed_json }}' | jq -r '.[].dir'); do
            sindri ext validate "$DIR" || FAILED=$((FAILED + 1))
          done
          if [ $FAILED -gt 0 ]; then exit 1; fi

      # ── Build changed extensions ───────────────────────────────────────────
      - name: Build changed extensions
        if: steps.changes.outputs.count != '0'
        run: |
          FAILED=0
          for ROW in $(echo '${{ steps.changes.outputs.changed_json }}' | jq -r '.[] | @base64'); do
            _jq() { echo "${ROW}" | base64 --decode | jq -r "${1}"; }
            DIR=$(_jq '.dir')
            BUILDABLE=$(_jq '.buildable')
            if [ "$BUILDABLE" = "false" ]; then
              echo "⚠ Skipping $DIR (buildable: false)"
              continue
            fi
            echo "── Building $DIR ──"
            sindri ext build "$DIR" --ide-root "$SINDRI_IDE_ROOT" || FAILED=$((FAILED + 1))
          done
          if [ $FAILED -gt 0 ]; then
            echo "✘ $FAILED extension(s) failed to build."
            exit 1
          fi

      # ── Validate index.json can be regenerated cleanly ────────────────────
      - name: Validate index.json
        run: |
          sindri ext build-index --repo .
          if ! git diff --exit-code index.json; then
            echo "ERROR: index.json is out of date. Run 'sindri ext build-index' and commit the result."
            exit 1
          fi
