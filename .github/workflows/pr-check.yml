name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest

    env:
      SINDRI_IDE_ROOT: ${{ github.workspace }}/sindri-ide

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      # ── Detect changed extensions ─────────────────────────────────────────
      - name: Detect changed extensions
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          DIRS=""
          for f in $CHANGED; do
            DIR=$(echo "$f" | cut -d'/' -f1)
            if [ -f "$DIR/manifest.json" ] && ! echo "$DIRS" | grep -qw "$DIR"; then
              DIRS="$DIRS $DIR"
            fi
          done
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT
          echo "Changed extension folders: $DIRS"

      # ── Version bump check ────────────────────────────────────────────────
      # Fail if a changed extension's manifest version is already released.
      # The developer must bump the version in manifest.json before merging.
      - name: Check version bumps
        if: steps.changes.outputs.dirs != ''
        run: |
          git fetch --tags origin
          FAILED=0
          for DIR in ${{ steps.changes.outputs.dirs }}; do
            ID=$(jq -r .id "$DIR/manifest.json")
            VERSION=$(jq -r .version "$DIR/manifest.json")
            TAG="${ID}-v${VERSION}"
            if git tag -l "$TAG" | grep -q "$TAG"; then
              echo "ERROR: $ID@$VERSION is already released (tag $TAG exists)."
              echo "  Bump the version in $DIR/manifest.json before merging."
              FAILED=$((FAILED + 1))
            else
              echo "✓ $ID@$VERSION is a new version — will release on merge."
            fi
          done
          if [ $FAILED -gt 0 ]; then exit 1; fi

      # ── Clone sindri-ide inside the workspace ─────────────────────────────
      - name: Checkout sindri-ide
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sindri
          path: sindri-ide
          sparse-checkout: |
            /package.json
            /bun.lockb
            scripts/
            packages/
          sparse-checkout-cone-mode: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sindri-ide dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ github.workspace }}/sindri-ide

      # ── Build changed extensions (no --bundle, faster) ────────────────────
      - name: Build changed extensions
        if: steps.changes.outputs.dirs != ''
        run: |
          FAILED=0
          for DIR in ${{ steps.changes.outputs.dirs }}; do
            BUILDABLE=$(jq -r '.buildable // true' "$DIR/manifest.json")
            if [ "$BUILDABLE" = "false" ]; then
              echo "⚠ Skipping $DIR (buildable: false in manifest.json)"
              continue
            fi
            echo "── Building $DIR ──"
            bun run build-ext "$DIR" || FAILED=$((FAILED + 1))
          done
          if [ $FAILED -gt 0 ]; then
            echo "✘ $FAILED extension(s) failed to build."
            exit 1
          fi

      # ── Validate index.json can be regenerated cleanly ────────────────────
      - name: Validate index.json
        run: |
          bun run build-index
          if ! git diff --exit-code index.json; then
            echo "ERROR: index.json is out of date. Run 'bun run build-index' and commit the result."
            exit 1
          fi
