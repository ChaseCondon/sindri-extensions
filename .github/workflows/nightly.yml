name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build:
    name: Build All Extensions
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      SINDRI_IDE_ROOT: ${{ github.workspace }}/sindri-ide

    steps:
      - uses: actions/checkout@v4

      # ── Checkout sindri-ide (bun deps + Rust CLI source) ───────────────────
      - name: Checkout sindri-ide
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sindri
          path: sindri-ide
          sparse-checkout: |
            /package.json
            /bun.lockb
            scripts/
            packages/
            src-tauri/Cargo.toml
            src-tauri/Cargo.lock
            src-tauri/crates/sindri-cli/
            src-tauri/crates/sindri-core/
            src-tauri/src/lib.rs
          sparse-checkout-cone-mode: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Bun (needed by ext build's JS bundle step) ─────────────────────────
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install sindri-ide dependencies
        run: bun install --frozen-lockfile
        working-directory: ${{ github.workspace }}/sindri-ide

      # ── Rust + sindri CLI ──────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sindri-ide/src-tauri -> target

      - name: Build sindri CLI
        run: cargo build --release -p sindri-cli
        working-directory: ${{ github.workspace }}/sindri-ide/src-tauri

      - name: Add sindri to PATH
        run: echo "${{ github.workspace }}/sindri-ide/src-tauri/target/release" >> $GITHUB_PATH

      # ── Build all extensions (mirrors build-extensions.ts --all --bundle) ──
      # Recursive find of all manifest.json dirs, skipping buildable:false.
      - name: Build all extensions
        run: |
          FAILED=0
          while IFS= read -r mf; do
            dir=$(dirname "$mf")
            BUILDABLE=$(jq -r 'if .buildable == false then "false" else "true" end' "$mf")
            if [ "$BUILDABLE" = "false" ]; then
              echo "⚠ Skipping ${dir#./} (buildable: false)"
              continue
            fi
            echo "── ${dir#./} ──"
            sindri ext build "$dir" --bundle --ide-root "$SINDRI_IDE_ROOT" || FAILED=$((FAILED + 1))
          done < <(find . -not \( -path '*/node_modules/*' -prune \) -name manifest.json | sort)
          if [ $FAILED -gt 0 ]; then
            echo "✘ $FAILED extension(s) failed to build."
            exit 1
          fi

      - name: Rename assets to nightly names
        run: |
          mkdir -p nightly-dist
          for sinxt in */dist/*.sinxt; do
            [ -f "$sinxt" ] || continue
            filename=$(basename "$sinxt")
            nightly_name=$(echo "$filename" | sed 's/-[0-9][0-9.]*\(-.*\)\?\.sinxt$/-nightly.sinxt/')
            cp "$sinxt" "nightly-dist/$nightly_name"
            echo "  $filename → $nightly_name"
          done
          ls nightly-dist/

      - name: Publish nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          NOTES="Automated nightly build from \`main\` @ \`${SHA:0:7}\` on ${DATE}."
          if gh release view nightly &>/dev/null; then
            gh release upload nightly nightly-dist/*.sinxt --clobber
            gh release edit nightly --title "Nightly (${DATE})" --notes "$NOTES"
          else
            gh release create nightly --title "Nightly (${DATE})" --notes "$NOTES" --prerelease nightly-dist/*.sinxt
          fi

      - name: Update nightly tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f nightly
          git push origin nightly --force
