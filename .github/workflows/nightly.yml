name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:        # allow manual trigger

concurrency:
  group: nightly
  cancel-in-progress: true  # if two nightlies queue, keep only the latest

jobs:
  build:
    name: Build All Extensions
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create / update the nightly release

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Checkout sindri-ide
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sindri
          path: ../sindri-ide
          sparse-checkout: |
            scripts/
            packages/
          sparse-checkout-cone-mode: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sindri-ide dependencies
        run: bun install --frozen-lockfile
        working-directory: ../sindri-ide

      # Build every extension with --bundle, producing dist/<id>-<version>.sinxt
      - name: Build all extensions
        run: bun run build

      # Rename each .sinxt to <id>-nightly.sinxt so the download URL is stable.
      - name: Rename assets to nightly names
        run: |
          mkdir -p nightly-dist
          for sinxt in */dist/*.sinxt; do
            [ -f "$sinxt" ] || continue
            filename=$(basename "$sinxt")
            # Strip the version suffix: sindri.foo-1.2.3.sinxt → sindri.foo-nightly.sinxt
            nightly_name=$(echo "$filename" | sed 's/-[0-9][0-9.]*\(-.*\)\?\.sinxt$/-nightly.sinxt/')
            cp "$sinxt" "nightly-dist/$nightly_name"
            echo "  $filename → $nightly_name"
          done
          ls nightly-dist/

      # Create or update the rolling `nightly` release.
      # --clobber replaces existing assets with the same name.
      - name: Publish nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          NOTES="Automated nightly build from \`main\` @ \`${SHA:0:7}\` on ${DATE}."

          if gh release view nightly &>/dev/null; then
            gh release upload nightly nightly-dist/*.sinxt --clobber
            gh release edit nightly \
              --title "Nightly (${DATE})" \
              --notes "$NOTES"
          else
            gh release create nightly \
              --title "Nightly (${DATE})" \
              --notes "$NOTES" \
              --prerelease \
              nightly-dist/*.sinxt
          fi

      # Keep the `nightly` tag pointing to the latest commit.
      - name: Update nightly tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f nightly
          git push origin nightly --force
