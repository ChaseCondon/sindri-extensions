name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false  # never cancel a release mid-flight

jobs:
  release:
    name: Create Release PR or Publish
    runs-on: ubuntu-latest
    # Skip commits made by the Changesets action itself to avoid loops.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write       # create releases + push version bump commit
      pull-requests: write  # create / update the Version PR

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the Version PR commit triggers other workflows.
          # Falls back to GITHUB_TOKEN if PAT is not configured.
          token: ${{ secrets.RELEASE_BOT_PAT || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      # sindri-ide is required by create-releases.ts to build .sinxt bundles.
      # We use a sparse checkout to fetch only the scripts and API package.
      - name: Checkout sindri-ide
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sindri
          path: ../sindri-ide
          sparse-checkout: |
            scripts/
            packages/
          sparse-checkout-cone-mode: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sindri-ide dependencies
        run: bun install --frozen-lockfile
        working-directory: ../sindri-ide

      # The Changesets action handles two modes automatically:
      #   • Pending changesets  → create/update "Version Packages" PR
      #   • Version PR merged   → run `bun run release` (create GitHub Releases)
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          title: "chore: release packages"
          commit: "chore: release packages [skip ci]"
          createGithubReleases: false  # we handle release creation in create-releases.ts
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_PAT || secrets.GITHUB_TOKEN }}
