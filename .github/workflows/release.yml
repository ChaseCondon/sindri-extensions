name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Version Bump & Release
    runs-on: ubuntu-latest
    # Skip the version-bump commit itself to prevent re-triggering
    if: "!contains(github.event.head_commit.message, 'chore: release packages')"

    permissions:
      contents: write

    env:
      SINDRI_IDE_ROOT: ${{ github.workspace }}/sindri-ide

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Detect pending changesets
        id: detect
        run: |
          COUNT=$(find .changeset -name "*.md" ! -name "README.md" | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Checkout sindri-ide
        if: steps.detect.outputs.count != '0'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sindri
          path: sindri-ide
          sparse-checkout: |
            /package.json
            /bun.lockb
            scripts/
            packages/
          sparse-checkout-cone-mode: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sindri-ide dependencies
        if: steps.detect.outputs.count != '0'
        run: bun install --frozen-lockfile
        working-directory: ${{ github.workspace }}/sindri-ide

      - name: Bump versions
        if: steps.detect.outputs.count != '0'
        run: bun run version

      - name: Commit version bumps
        if: steps.detect.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release packages"
          git push origin main

      - name: Build and publish releases
        if: steps.detect.outputs.count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release
