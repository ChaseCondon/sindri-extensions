<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bug: head + body + antennae + 6 legs + wing divider -->

  <!-- Head -->
  <circle cx="10" cy="5.5" r="2.5" stroke-width="1.5"/>
  <!-- Body (oval) -->
  <ellipse cx="10" cy="13.5" rx="4" ry="4.5" stroke-width="1.5"/>

  <!-- Antennae (V from top of head) -->
  <line x1="8.5" y1="3.5" x2="6"   y2="1.5" stroke-width="1.2"/>
  <line x1="11.5" y1="3.5" x2="14" y2="1.5" stroke-width="1.2"/>

  <!-- Left legs -->
  <line x1="6" y1="11"   x2="2.5" y2="9.5"  stroke-width="1.2"/>
  <line x1="6" y1="13.5" x2="2.5" y2="13.5" stroke-width="1.2"/>
  <line x1="6" y1="16"   x2="2.5" y2="17.5" stroke-width="1.2"/>

  <!-- Right legs -->
  <line x1="14" y1="11"   x2="17.5" y2="9.5"  stroke-width="1.2"/>
  <line x1="14" y1="13.5" x2="17.5" y2="13.5" stroke-width="1.2"/>
  <line x1="14" y1="16"   x2="17.5" y2="17.5" stroke-width="1.2"/>

  <!-- Wing divider (dashed centre line on body) -->
  <line x1="10" y1="9" x2="10" y2="18" stroke-width="1" stroke-dasharray="1.5 1.2"/>
</svg>
