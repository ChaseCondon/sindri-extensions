<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Git branch: main vertical lane + one branch off to the right.
       CIRCLES = commits; open circle = fork/branch-point. -->

  <!-- Main branch (left lane) -->
  <line x1="6" y1="17" x2="6" y2="3" stroke-width="1.6" fill="none"/>

  <!-- Branch-off (diagonal from fork point to tip) -->
  <line x1="6" y1="10" x2="14" y2="4" stroke-width="1.6" fill="none"/>

  <!-- Bottom commit (filled) -->
  <circle cx="6" cy="17" r="2.2" fill="currentColor" stroke="none"/>

  <!-- Top of main branch (filled) -->
  <circle cx="6" cy="3" r="2.2" fill="currentColor" stroke="none"/>

  <!-- Branch tip (filled) -->
  <circle cx="14" cy="4" r="2.2" fill="currentColor" stroke="none"/>

  <!-- Fork/branch point (open — marks where the branch diverged) -->
  <circle cx="6" cy="10" r="1.8" fill="none" stroke-width="1.6"/>
</svg>
